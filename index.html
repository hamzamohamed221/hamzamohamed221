<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Mohamed | Graphic Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;800&family=Righteous&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; background-color: #121212; color: #EEEEEE; 
            font-family: 'Inter', sans-serif; text-align: center; 
        }

        header { padding: 60px 20px 20px 20px; }

        /* Updated Name Font */
        h1.name { 
            font-family: 'Righteous', cursive; 
            color: #CCFF00; 
            font-size: 5rem; 
            margin: 0; 
            text-transform: uppercase;
            text-shadow: 3px 3px 0px rgba(204, 255, 0, 0.1);
        }

        .subtitle { 
            font-size: 1.2rem; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            margin-top: -10px;
        }

        /* Split Hero Section */
        .hero-split {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap; 
            padding: 40px 20px;
            gap: 30px;
        }

        .hero-left { flex: 1; max-width: 400px; }
        .hero-right { flex: 1; max-width: 450px; }

        .mascot-img { 
            width: 100%; 
            border-radius: 20px; 
            border: 2px solid #333;
        }
        
        /* CN Tower Image Styling */
        .tower-img { 
            width: 100%; 
            border-radius: 20px; 
            filter: drop-shadow(0 0 15px rgba(204, 255, 0, 0.1));
        }

        /* Content Area */
        .content { padding: 60px 20px; }
        .container { max-width: 800px; margin: 0 auto; }

        .profile-pic { 
            width: 180px; height: 180px; border-radius: 50%; object-fit: cover; 
            margin-bottom: 30px; border: 4px solid #CCFF00; 
        }

        .section-title { color: #CCFF00; font-size: 2.2rem; margin-bottom: 20px; font-weight: 800; }
        .bio { font-size: 1.1rem; line-height: 1.8; color: #BBB; margin-bottom: 40px; }

        .divider { width: 60px; border-bottom: 5px solid #CCFF00; margin: 50px auto; }

        /* Contact Buttons */
        .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
        
        .primary-btn { 
            background-color: #CCFF00; color: #121212; padding: 16px 35px; 
            border-radius: 8px; text-decoration: none; font-weight: 800; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .secondary-btn { 
            background-color: transparent; color: #CCFF00; border: 2px solid #CCFF00;
            padding: 14px 35px; border-radius: 8px; text-decoration: none; font-weight: 800; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .primary-btn:hover { background-color: #fff; transform: translateY(-3px); }
        .secondary-btn:hover { background-color: rgba(204, 255, 0, 0.1); transform: translateY(-3px); }

        footer { padding: 60px; border-top: 1px solid #333; color: #555; font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <header>
        <h1 class="name">Hamza Mohamed</h1>
        <p class="subtitle">Graphic Designer</p>
    </header>

    <section class="hero-split">
        <div class="hero-left">
            <img src="https://i.ibb.co/LzNfX6B/mascot.webp" alt="Mascot Design" class="mascot-img">
        </div>
        <div class="hero-right">
            <img src="https://th.bing.com/th/id/OIP.JBJPqmWveXeBZ8B12hlYJAHaHa?o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3" alt="CN Tower Illustration" class="tower-img">
        </div>
    </section>

    <main class="content">
        <div class="container">
